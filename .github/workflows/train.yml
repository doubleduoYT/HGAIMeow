name: Train HGAI v7

on:
  workflow_dispatch:
    inputs:
      preset:
        description: "model preset"
        required: true
        default: "mid-safe"
        type: choice
        options:
          - tiny
          - phone
          - mid-safe
          - mid-plus
          - pc
      steps:
        description: "training steps"
        required: true
        default: "6000"
      generation_mode:
        description: "benchmark generation mode"
        required: true
        default: "safe"
        type: choice
        options:
          - safe
          - creative
          - off
  push:
    branches: [ main, master ]
    paths:
      - "run_hgai.py"
      - "train.txt"
      - "knowledge.json"
      - "personality.json"
      - "eval_tests.json"
      - ".github/workflows/train.yml"

jobs:
  train:
    runs-on: ubuntu-latest
    env:
      PRESET: ${{ github.event.inputs.preset || 'mid-safe' }}
      STEPS: ${{ github.event.inputs.steps || '6000' }}
      GENMODE: ${{ github.event.inputs.generation_mode || 'safe' }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install torch

      - name: Validate dataset
        run: |
          python validate_dataset.py
          python run_hgai.py --validate --lite

      - name: Train model
        run: |
          python run_hgai.py --retrain --preset "$PRESET" --steps "$STEPS" --threads 2

      - name: Info and benchmark
        run: |
          python run_hgai.py --info --preset "$PRESET"
          python run_hgai.py --benchmark --preset "$PRESET" --generation-mode "$GENMODE"
          python run_hgai.py --eval --preset "$PRESET" --generation-mode safe

      - name: Prepare artifact
        run: |
          mkdir -p dist
          cp run_hgai.py train.txt knowledge.json personality.json eval_tests.json validate_dataset.py requirements.txt README.md TERMUX_TORCH_GUIDE.txt DATASET_REPORT.json hgai_model.pth dist/
          ls -lah dist

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: hgai-v7-model-${{ env.PRESET }}
          path: dist/*
          if-no-files-found: error
